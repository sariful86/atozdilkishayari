<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | A To Z Dil Ki Shayari</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="firebase.js"></script>

<style>
body{
    margin:0;
    padding:0;
    font-family:'Poppins',sans-serif;
    background: linear-gradient(135deg,#141414,#1f1f1f);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:#fff;
}

/* CARD */
.card{
    width:90%;
    max-width:360px;
    padding:30px;
    border-radius:16px;
    background:rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    text-align:center;
    box-shadow:0 8px 24px rgba(0,0,0,0.5);
}

/* TITLE */
h1{
    font-size:22px;
    margin-bottom:8px;
}

/* SUBTEXT */
p{
    font-size:14px;
    color:#bbb;
    margin-bottom:20px;
}

/* BUTTONS */
button{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    transition:0.2s;
}

button:hover{
    transform:scale(1.03);
}

/* GOOGLE BUTTON */
.google{
    background:#fff;
    color:#000;
}

/* GUEST BUTTON */
.guest{
    background:transparent;
    color:#fff;
    border:1px solid #555;
}

/* ICONS */
img{
    width:20px;
}

/* LOADER */
.loader{
    display:none;
    margin:15px auto 0;
    width:22px;
    height:22px;
    border:3px solid #444;
    border-top:3px solid #fff;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    0%{transform:rotate(0);}
    100%{transform:rotate(360deg);}
}

/* SMALL NOTE */
.small{
    font-size:12px;
    color:#aaa;
    margin-top:12px;
}

/* RESPONSIVE */
@media(max-width:400px){
    .card{
        padding:20px;
    }
    h1{
        font-size:20px;
    }
    p{
        font-size:13px;
    }
    button{
        font-size:14px;
        padding:10px;
    }
}
</style>
</head>
<body>

<div class="card">

<h1>❤️ A To Z Dil Ki Shayari ❤️</h1>
<p>Login to continue and enjoy shayari</p>

<button class="google" onclick="login()">
<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
Continue with Google
</button>

<button class="guest" onclick="guest()">👤 Continue as Guest</button>

<div class="loader" id="loader"></div>

<div class="small">New users will auto-create an account 🚀</div>

</div>

<script>
function login(){
    document.getElementById("loader").style.display="block";
    let provider = new firebase.auth.GoogleAuthProvider();
    firebase.auth().signInWithPopup(provider)
    .then(res=>{
        document.getElementById("loader").style.display="none";
        alert("Welcome " + res.user.displayName);
        window.location="index.html";
    })
    .catch(err=>{
        document.getElementById("loader").style.display="none";
        alert(err.message);
    });
}

function guest(){
    localStorage.setItem("guest","true");
    alert("Guest mode enabled 👍");
    window.location="index.html";
}

// AUTO LOGIN
firebase.auth().onAuthStateChanged(user=>{
    if(user){
        window.location="index.html";
    }
});
</script>

</body>
</html>
